services:
  mariadb:
    image: mariadb:latest
    container_name: laravel-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: my-secret-pw
      MARIADB_DATABASE: laravel
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
